name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        timeout-minutes: 10
        # --forked: each test in its own subprocess so RAM (esp. ONNX models
        # at ~420MB each) is fully released between tests. Without this the
        # 27+ tests that call await ums.initialize() in test_unified_memory_system.py
        # accumulate enough RSS on the GH runner to trigger SIGTERM/OOM at
        # the 80% mark. Linux/macOS only (uses os.fork); Windows local runs
        # use the standard in-process pytest path.
        # --timeout=60: per-test cap so a hung test self-reports with a name.
        run: pytest --tb=short -q --timeout=60 --forked

  plugin-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Verify OpenCode plugin parses
        run: bun build roampal/plugins/opencode/roampal.ts --outdir /tmp/plugin-out --target bun --packages external
